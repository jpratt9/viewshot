<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="modes" id="modes">
    <button class="mode" data-mode="visible"><span class="ico">▢</span><span class="lbl">Visible</span></button>
    <button class="mode" data-mode="fullpage"><span class="ico">▤</span><span class="lbl">Full page</span></button>
    <button class="mode" data-mode="region"><span class="ico">⛶</span><span class="lbl">Region</span></button>
  </div>

  <div class="err" id="err" hidden></div>

  <div class="opts">
    <label class="row">
      <span>Format</span>
      <select id="format">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
        <option value="webp">WebP</option>
        <option value="webm">WebM (record)</option>
        <option value="gif">GIF (record)</option>
      </select>
    </label>

    <label class="row" id="qualityRow">
      <span>Quality</span>
      <input type="range" id="quality" min="0.3" max="1" step="0.05" />
      <span id="qualityVal" class="val"></span>
    </label>

    <label class="row">
      <span>Name</span>
      <input type="text" id="filename" placeholder="shot-{date}-{time}" />
    </label>

    <label class="row check">
      <input type="checkbox" id="toClipboard" />
      <span>Copy to clipboard instead of download</span>
    </label>

    <label class="row check">
      <input type="checkbox" id="hideScrollbar" />
      <span>Hide scrollbar before capturing</span>
    </label>
  </div>

  <div class="foot">
    <span id="hint">{date} {time} {domain} {title}</span>
    <a href="#" id="shortcuts">Shortcuts</a>
  </div>

  <button class="mode stop" id="stopBtn" disabled><span class="ico">⏹</span><span class="lbl">Stop recording</span></button>

  <script src="popup.js"></script>
</body>
</html>
